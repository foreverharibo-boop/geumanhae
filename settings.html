<div id="geumanhae-panel">
  <div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
      <b>그만해</b>
      <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">

      <!-- 오늘 사용량 요약 -->
      <div class="gmh-panel">
        <div class="gmh-title"><span><span class="gmh-icon">📊</span>오늘 사용량</span></div>
        <div class="gmh-stat-row">
          <div class="gmh-stat-box" id="gmh-stat-time-box">
            <div class="gmh-val"><span id="gmh-stat-time-val">0</span><span style="font-size:12px">분</span></div>
          </div>
          <div class="gmh-stat-box" id="gmh-stat-msg-box">
            <div class="gmh-val"><span id="gmh-stat-msg-val">0</span><span style="font-size:12px">개</span></div>
          </div>
        </div>
        <div class="gmh-progress-bar"><div class="gmh-progress-fill" id="gmh-progress-fill"></div></div>
      </div>

      <!-- 활성화 -->
      <div class="gmh-panel">
        <div class="gmh-title">그만해 활성화
          <div class="gmh-switch" id="gmh-enabled-toggle"><div class="gmh-knob"></div></div>
        </div>
      </div>

      <!-- 제한 방식 선택 -->
      <div class="gmh-panel">
        <div class="gmh-title"><span class="gmh-icon">🧭</span>제한 방식</div>
        <div class="gmh-radio-group" id="gmh-limittype-group">
          <div class="gmh-radio-option gmh-selected" data-limittype="usage">
            <div class="gmh-dot"></div>
            <div>사용량 기반</div>
          </div>
          <div class="gmh-radio-option" data-limittype="schedule">
            <div class="gmh-dot"></div>
            <div>시간대 기반</div>
          </div>
        </div>
      </div>

      <!-- 리밋 설정 (사용량 기반) -->
      <div class="gmh-panel" id="gmh-usage-panel">
        <div class="gmh-title"><span class="gmh-icon">⏱️</span>일일 제한</div>
        <div class="gmh-row">
          <div>
            <div class="gmh-row-label">시간 제한</div>
          </div>
          <div class="gmh-input-group"><input type="number" id="gmh-time-limit-input" min="0" value="150" /><span class="gmh-unit">분</span></div>
        </div>
        <div class="gmh-row">
          <div>
            <div class="gmh-row-label">메시지 제한</div>
          </div>
          <div class="gmh-input-group"><input type="number" id="gmh-msg-limit-input" min="0" value="80" /><span class="gmh-unit">개</span></div>
        </div>
        <div class="gmh-row">
          <div class="gmh-row-label">리셋 시각</div>
          <input type="time" id="gmh-reset-time-input" value="00:00" />
        </div>
      </div>

      <!-- 시간대 제한 (시간대 기반) -->
      <div class="gmh-panel" id="gmh-schedule-panel" style="display:none;">
        <div class="gmh-title"><span class="gmh-icon">🌙</span>시간대 제한</div>
        <div class="gmh-radio-group" id="gmh-schedulemode-group">
          <div class="gmh-radio-option gmh-selected" data-schedulemode="curfew">
            <div class="gmh-dot"></div>
            <div>커퓨 (이 시간대는 금지)</div>
          </div>
          <div class="gmh-radio-option" data-schedulemode="window">
            <div class="gmh-dot"></div>
            <div>허용 윈도 (이 시간대만 허용)</div>
          </div>
        </div>
        <div class="gmh-row">
          <div class="gmh-row-label">시작</div>
          <input type="time" id="gmh-schedule-start-input" value="23:00" />
        </div>
        <div class="gmh-row">
          <div class="gmh-row-label">종료</div>
          <input type="time" id="gmh-schedule-end-input" value="07:00" />
        </div>
        <div class="gmh-row-label" id="gmh-schedule-status" style="margin-top:6px; padding-top:6px;"></div>
      </div>

      <!-- 초과 시 동작 (공용 - 사용량이든 시간대든 동일하게 적용) -->
      <div class="gmh-panel">
        <div class="gmh-title"><span class="gmh-icon">🚫</span>초과 시 동작</div>
        <div class="gmh-radio-group" id="gmh-mode-group">
          <div class="gmh-radio-option gmh-selected" data-mode="bypass">
            <div class="gmh-dot"></div>
            <div>
              <div>우회 가능</div>
            </div>
          </div>
          <div class="gmh-radio-option" data-mode="block">
            <div class="gmh-dot"></div>
            <div>
              <div>완전 차단</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 넛지 -->
      <div class="gmh-panel">
        <div class="gmh-title">넛지 알림
          <div class="gmh-switch" id="gmh-nudge-toggle"><div class="gmh-knob"></div></div>
        </div>
        <div class="gmh-row">
          <div>
            <div class="gmh-row-label">알림 간격</div>
          </div>
          <div class="gmh-input-group"><input type="number" id="gmh-nudge-interval-input" min="1" value="30" /><span class="gmh-unit">분</span></div>
        </div>
      </div>

      <button class="gmh-footer-btn gmh-reset-danger" id="gmh-reset-today-btn">오늘 사용량 초기화</button>

    </div>
  </div>
</div>
