<div id="geumanhae-panel">
  <div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
      <b>그만해</b>
      <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">

      <!-- 오늘 사용량 요약 -->
      <div class="gmh-panel">
        <div class="gmh-title"><span><span class="gmh-icon">📊</span>오늘 사용량</span></div>
        <div class="gmh-stat-row">
          <div class="gmh-stat-box" id="gmh-stat-time-box">
            <div class="gmh-val"><span id="gmh-stat-time-val">0</span><span style="font-size:12px;opacity:0.6">분</span></div>
            <div class="gmh-label" id="gmh-stat-time-label">제한 없음</div>
          </div>
          <div class="gmh-stat-box" id="gmh-stat-msg-box">
            <div class="gmh-val"><span id="gmh-stat-msg-val">0</span><span style="font-size:12px;opacity:0.6">개</span></div>
            <div class="gmh-label" id="gmh-stat-msg-label">제한 없음</div>
          </div>
        </div>
        <div class="gmh-progress-bar"><div class="gmh-progress-fill" id="gmh-progress-fill"></div></div>
      </div>

      <!-- 활성화 -->
      <div class="gmh-panel">
        <div class="gmh-title">그만해 활성화
          <div class="gmh-switch" id="gmh-enabled-toggle"><div class="gmh-knob"></div></div>
        </div>
      </div>

      <!-- 리밋 설정 -->
      <div class="gmh-panel">
        <div class="gmh-title"><span class="gmh-icon">⏱️</span>일일 제한</div>
        <div class="gmh-row">
          <div>
            <div class="gmh-row-label">시간 제한</div>
            <div class="gmh-row-sub">0 = 무제한</div>
          </div>
          <div class="gmh-input-group"><input type="number" id="gmh-time-limit-input" min="0" value="150" /><span class="gmh-unit">분</span></div>
        </div>
        <div class="gmh-row">
          <div>
            <div class="gmh-row-label">메시지 제한</div>
            <div class="gmh-row-sub">전송 횟수 기준</div>
          </div>
          <div class="gmh-input-group"><input type="number" id="gmh-msg-limit-input" min="0" value="80" /><span class="gmh-unit">개</span></div>
        </div>
        <div class="gmh-row">
          <div class="gmh-row-label">리셋 시각</div>
          <input type="time" id="gmh-reset-time-input" value="00:00" />
        </div>
      </div>

      <!-- 초과 시 동작 -->
      <div class="gmh-panel">
        <div class="gmh-title"><span class="gmh-icon">🚫</span>초과 시 동작</div>
        <div class="gmh-radio-group" id="gmh-mode-group">
          <div class="gmh-radio-option gmh-selected" data-mode="bypass">
            <div class="gmh-dot"></div>
            <div>
              <div>우회 가능</div>
              <div class="gmh-radio-desc">확인창 뜨고 "그래도 계속"으로 넘길 수 있음</div>
            </div>
          </div>
          <div class="gmh-radio-option" data-mode="block">
            <div class="gmh-dot"></div>
            <div>
              <div>완전 차단</div>
              <div class="gmh-radio-desc">전송 버튼 비활성화, 리셋 시각까지 대기</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 넛지 -->
      <div class="gmh-panel">
        <div class="gmh-title">넛지 알림
          <div class="gmh-switch" id="gmh-nudge-toggle"><div class="gmh-knob"></div></div>
        </div>
        <div class="gmh-row">
          <div>
            <div class="gmh-row-label">알림 간격</div>
            <div class="gmh-row-sub">연속 사용 기준</div>
          </div>
          <div class="gmh-input-group"><input type="number" id="gmh-nudge-interval-input" min="1" value="30" /><span class="gmh-unit">분</span></div>
        </div>
      </div>

      <button class="gmh-footer-btn gmh-reset-danger" id="gmh-reset-today-btn">오늘 사용량 초기화</button>

    </div>
  </div>
</div>
